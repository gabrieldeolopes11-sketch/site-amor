<!DOCTYPE html>
<html lang="pt-BR">

<head>

<title>Para o Amor da Minha Vida ❤️</title>

        <div class="linha"></div>

        <div class="linha"></div>

    </div>

</button>

target="_blank">

<button>
    🎵 Ouvir "Meu Abrigo"
</button>

<h2>❤️ Uma Última Mensagem</h2>

<button id="surpresa">

Clique Aqui ❤️

</button>

<footer>

Feito com muito amor ❤️

</footer>
